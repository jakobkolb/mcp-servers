name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Install
        run: make install

      - name: Lint
        run: make lint

      - name: Test
        run: make test

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        run: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Install kubeconform
        env:
          KUBECONFORM_VERSION: v0.6.7
        run: |
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin kubeconform

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v0.7.2

      - name: Lint chart
        run: helm lint chart/mcp-server

      - name: Validate rendered manifests
        run: |
          helm template test chart/mcp-server \
            --set image.repository=test \
            --set ingress.host=test.example.com \
            | kubeconform -strict -summary

      - name: Unit tests
        run: helm unittest chart/mcp-server

  discover-servers:
    runs-on: ubuntu-latest
    outputs:
      servers: ${{ steps.find.outputs.servers }}
    steps:
      - uses: actions/checkout@v4

      - name: Find servers with Dockerfiles
        id: find
        run: echo "servers=$(make list-servers)" >> "$GITHUB_OUTPUT"

  publish-chart:
    needs: [helm]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        run: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push chart
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          helm package chart/mcp-server --version "$VERSION" --app-version "$GITHUB_REF_NAME"
          helm push "mcp-server-${VERSION}.tgz" oci://ghcr.io/${{ github.repository_owner }}/charts

  build:
    needs: [lint-and-test, discover-servers]
    if: needs.discover-servers.outputs.servers != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        server: ${{ fromJson(needs.discover-servers.outputs.servers) }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.server }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short,enable={{is_default_branch}}
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: servers/${{ matrix.server }}
          platforms: ${{ github.event_name == 'push' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
