# Example values for deploying mcp-obsidian
# helm upgrade --install obsidian chart/mcp-server -f chart/values/mcp-obsidian.yaml

image:
  repository: ghcr.io/jakobkolb/mcp-obsidian
  tag: "latest"

service:
  port: 8080

ingress:
  host: obsidian.mcp.yourdomain.com
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: obsidian-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "MCP Authentication Required"

env:
  VAULT_PATH: /vault
  MCP_TRANSPORT: sse
  MCP_PORT: "8080"
  LOG_LEVEL: INFO

