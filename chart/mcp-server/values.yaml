replicaCount: 1

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  port: 8000

ingress:
  enabled: true
  className: nginx
  # cert-manager handles TLS automatically via the cluster-issuer annotation.
  #
  # Basic auth (recommended) — protect the MCP endpoint with a username/password.
  # Docs: https://kubernetes.github.io/ingress-nginx/examples/auth/basic/
  # Create the secret first:
  #   htpasswd -c auth <username>
  #   kubectl create secret generic <release>-basic-auth --from-file=auth
  # Then uncomment:
  #   nginx.ingress.kubernetes.io/auth-type: basic
  #   nginx.ingress.kubernetes.io/auth-secret: <release>-basic-auth
  #   nginx.ingress.kubernetes.io/auth-realm: "MCP Authentication Required"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: ""
  tls: true
  # Auto-generated from release name when empty
  tlsSecretName: ""

# Plain env vars (non-sensitive)
env: {}
  # OBSIDIAN_HOST: "127.0.0.1"

# Sensitive env vars — stored in a K8s Secret and injected as env vars
secretEnv: {}
  # OBSIDIAN_API_KEY: "my-api-key"

# Mount a config file from values into the container (content stored in a ConfigMap)
configFile:
  enabled: false
  mountPath: /config/config.yaml
  content: ""

# Additional volume mounts for the main MCP server container.
# Use this with extraVolumes to share storage with sidecars.
extraVolumeMounts: []
  # - name: vault
  #   mountPath: /vault

# PersistentVolumeClaims created and owned by this release.
# Reference them in extraVolumes using persistentVolumeClaim.claimName.
extraPersistentVolumeClaims: []
  # - name: vault
  #   storageClassName: standard
  #   accessModes:
  #     - ReadWriteOnce
  #   size: 10Gi

# Additional pod volumes shared by the main container and any sidecars.
extraVolumes: []
  # - name: vault
  #   persistentVolumeClaim:
  #     claimName: vault

# Additional containers that run in the same pod as the MCP server.
extraContainers: []
  # - name: sync
  #   image: example/sync:latest
  #   volumeMounts:
  #     - name: vault
  #       mountPath: /vault

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

nodeSelector: {}

tolerations: []

affinity: {}
