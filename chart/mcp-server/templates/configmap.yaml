{{- if .Values.configFile.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mcp-server.fullname" . }}-config
  labels:
    {{- include "mcp-server.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ base .Values.configFile.mountPath }}: |
    {{- .Values.configFile.content | nindent 4 }}
{{- end }}
